<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>אי הזיכרון האבוד</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/devTools.css" />
  </head>
  <body>
    <!-- Outer wrapper: letterboxes when the browser window is not 16:9. -->
    <main id="app">
      <!-- Inner 16:9 game viewport — all backgrounds and UI are positioned here. -->
      <section id="game-viewport">
        <div id="screen-bg" class="screen-bg fullscreen-art-background" aria-hidden="true"></div>
        <!-- All screens are injected into #screen by renderer.js -->
        <section id="screen" class="screen-root"></section>
      </section>
    </main>

    <!-- Load order matters: data and helpers first, then state, rendering, and finally bootstrap -->
    <script src="config/config.js"></script>
    <script src="config/assets.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/layoutGeometry.js"></script>
    <script src="js/gameLogic.js"></script>
    <script src="js/devTools.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/gameState.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
