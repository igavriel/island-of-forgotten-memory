<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="gold lost background placeholder">
  <defs>
    <radialGradient id="lgbg" cx="0.5" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#3a3024"/>
      <stop offset="1" stop-color="#211a12"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#lgbg)"/>
  <!-- sunken sea floor -->
  <path d="M0 760 q300 -50 600 0 t600 0 t720 0 V1080 H0 Z" fill="#16120c"/>
  <!-- skulls toward the corners, center kept clear -->
  <g fill="#cdbfa6" opacity="0.85">
    <g transform="translate(300 820)">
      <circle r="90"/>
      <circle cx="-32" cy="-14" r="20" fill="#211a12"/>
      <circle cx="32" cy="-14" r="20" fill="#211a12"/>
      <rect x="-30" y="50" width="60" height="40" rx="8"/>
    </g>
    <g transform="translate(1620 860) scale(0.8)">
      <circle r="90"/>
      <circle cx="-32" cy="-14" r="20" fill="#211a12"/>
      <circle cx="32" cy="-14" r="20" fill="#211a12"/>
    </g>
  </g>
  <!-- a few dull, lost coins -->
  <g fill="#8a6a2f" opacity="0.8">
    <circle cx="520" cy="940" r="22"/>
    <circle cx="1380" cy="960" r="20"/>
    <circle cx="1450" cy="930" r="16"/>
  </g>
  <g fill="none" stroke="#8a6a2f" stroke-width="6" opacity="0.3" stroke-dasharray="26 20">
    <rect x="40" y="40" width="1840" height="1000" rx="28"/>
  </g>
</svg>
