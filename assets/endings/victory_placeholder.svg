    </g>
    <rect x="-200" y="-40" width="400" height="150" rx="14" fill="#7a5a2f" stroke="#5a4523" stroke-width="8"/>
    <path d="M-200 -28 q200 -110 400 0 l0 30 q-200 -86 -400 0 z" fill="#8a6a2f" stroke="#5a4523" stroke-width="8"/>
    <rect x="-120" y="0" width="240" height="110" fill="#5a4523"/>
    <rect x="-120" y="0" width="240" height="40" fill="#3a2c16"/>
    <rect x="-28" y="18" width="56" height="56" rx="6" fill="#e8b733"/>
    <circle cx="0" cy="46" r="7" fill="#5a4523"/>
