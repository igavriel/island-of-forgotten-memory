      <stop offset="0" stop-color="#1c6086"/>
      <stop offset="1" stop-color="#0b3d5c"/>
    </radialGradient>
    <linearGradient id="vsea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e486a"/>
      <stop offset="1" stop-color="#072c43"/>
